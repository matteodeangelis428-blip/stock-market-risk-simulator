<!DOCTYPE html>
<html>
<head>
<title>Stock Market Risk Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Stock Market Risk Simulator</h1>

<p>This tool simulates possible future stock market outcomes using Monte Carlo simulation based on historical S&P 500 behavior.</p>

<button onclick="runSimulation()">Run Simulation</button>

<canvas id="chart" width="800" height="400"></canvas>

<script>

function runSimulation(){

let simulations = 50
let days = 252*10
let start = 100

let datasets = []

for(let s=0; s<simulations; s++){

let price = start
let data = []

for(let d=0; d<days; d++){

let shock = (Math.random()-0.5)*0.02
price = price*(1+shock)

data.push(price)

}

datasets.push({
data:data,
borderColor:"rgba(0,0,255,0.2)",
pointRadius:0,
fill:false
})

}

const ctx = document.getElementById('chart')

new Chart(ctx,{
type:'line',
data:{
labels:Array(days).fill(""),
datasets:datasets
},
options:{
responsive:false,
plugins:{
legend:{display:false}
}
}
})

}

</script>

</body>
</html>
