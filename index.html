<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S&P 500 Volatility Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Select2 for searchable dropdown -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

<style>
body {
    font-family: "Segoe UI", sans-serif;
    margin:0; padding:0;
    background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
    color:#fff;
    text-align:center;
}
header { padding: 2rem; }
#controls { margin-bottom:1rem; }
select { width:300px; margin-right:1rem; }
canvas { max-width:90vw; height:50vh; margin:2rem auto; background:rgba(255,255,255,0.05); border-radius:14px; box-shadow:0px 4px 20px rgba(255,255,255,0.15);}
#stockInfo { margin-top:1rem; font-size:1.1rem;}
#heatmap { display:grid; grid-template-columns: repeat(auto-fill, minmax(60px,1fr)); grid-gap:2px; max-width:90vw; margin:2rem auto;}
.heatCell { width:100%; padding:6px; font-size:0.7rem; color:#fff; border-radius:2px; text-align:center;}
@media(max-width:600px){select{width:90%; margin-bottom:0.5rem;}}
</style>
</head>
<body>

<header>
<h1>S&P 500 Volatility Dashboard</h1>
<p>Select stocks, see live prices, volatility, heatmap & rolling forecasts</p>
<div id="controls">
<select id="stockSelect" multiple></select>
</div>
<div id="stockInfo"></div>
<canvas id="volChart"></canvas>
<div id="heatmap"></div>
</header>

<script>
// ========================================
// 1. S&P 500 SYMBOLS (sample subset for demo, replace with full 500)
// ========================================
const sp500Symbols = ["AAPL","MSFT","AMZN","GOOGL","TSLA","NVDA","META","BRK-B","JPM","JNJ","V","UNH","HD","PG","MA","BAC","WMT","DIS","ADBE","CMCSA","NFLX","PYPL","PFE","KO","PEP","INTC","CSCO","CRM","XOM","T","CVX","ABBV","ABT","AVGO","NKE","ORCL","MRK","LLY","MCD","ACN","COST","TXN","QCOM","DHR","NEE","LIN","AMD","SCHW","BMY","SPGI"];
// populate dropdown
const selectEl = document.getElementById("stockSelect");
sp500Symbols.forEach(sym => {
    let opt=document.createElement("option"); opt.value=sym; opt.text=sym; selectEl.add(opt);
});
window.onload = ()=>{ $(selectEl).select2({placeholder:"Search stocks..."}) };

// ========================================
// 2. Chart.js setup
// ========================================
const ctx = document.getElementById("volChart").getContext("2d");
let volChart;
async function fetchStockData(symbol){
    try{
        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1mo&interval=1d`);
        const json = await res.json();
        const chartData=json.chart.result[0];
        const timestamps=chartData.timestamp;
        const prices=chartData.indicators.quote[0].close;
        // daily returns
        let returns=[]; for(let i=1;i<prices.length;i++){returns.push((prices[i]-prices[i-1])/prices[i-1]);}
        const mean = returns.reduce((a,b)=>a+b,0)/returns.length;
        const variance=returns.map(r=>Math.pow(r-mean,2)).reduce((a,b)=>a+b,0)/(returns.length-1);
        const vol=Math.sqrt(variance);

        // rolling volatility 7-day & 30-day
        const rolling7=prices.slice(-7).length>1?Math.sqrt(prices.slice(-7).map((p,i,a)=>i>0?(p-a[i-1])/a[i-1]:0).slice(1).reduce((sum,r)=>sum+Math.pow(r-(returns.reduce((a,b)=>a+b,0)/returns.length),2),0)/(6)):0;
        const rolling30=prices.slice(-30).length>1?Math.sqrt(prices.slice(-30).map((p,i,a)=>i>0?(p-a[i-1])/a[i-1]:0).slice(1).reduce((sum,r)=>sum+Math.pow(r-(returns.reduce((a,b)=>a+b,0)/returns.length),2),0)/(29)):0;

        // color by volatility
        let color=vol<0.015?"#4AFE82":vol<0.03?"#F2E94E":"#FF4E4E";
        return {dates:timestamps.map(t=>new Date(t*1000).toLocaleDateString()), prices, vol, color, rolling7, rolling30};
    }catch(err){console.error(err); return null;}
}

// ========================================
// 3. Update dashboard
// ========================================
async function updateDashboard(){
    const selected = Array.from(selectEl.selectedOptions).map(o=>o.value);
    if(selected.length===0) return;

    // fetch all selected stocks
    const stockDataArray = await Promise.all(selected.map(fetchStockData));

    // destroy old chart
    if(volChart) volChart.destroy();

    // prepare datasets for Chart.js
    const datasets=stockDataArray.map(sd=>{
        return {label:`${sd ? sd.prices.length && sd.dates[sd.dates.length-1] ? sd.prices[sd.prices.length-1]:'' : ''}`, data: sd ? sd.prices : [], borderColor: sd.color, backgroundColor: sd.color+"55", tension:0.25, fill:true};
    });

    // create chart
    volChart=new Chart(ctx,{type:"line",data:{labels:stockDataArray[0].dates,datasets},options:{responsive:true,scales:{x:{ticks:{color:"#FFF"},grid:{color:"rgba(255,255,255,0.1)"}},y:{ticks:{color:"#FFF"},grid:{color:"rgba(255,255,255,0.1)"}}},plugins:{tooltip:{mode:"index",intersect:false}}}});

    // update info panel
    let infoHTML="";
    stockDataArray.forEach((sd,i)=>{
        if(sd){
            infoHTML+=`<strong>${selected[i]}</strong> Latest: $${sd.prices[sd.prices.length-1].toFixed(2)} | Vol: ${(sd.vol*100).toFixed(2)}% | 7-day: ${(sd.rolling7*100).toFixed(2)}% | 30-day: ${(sd.rolling30*100).toFixed(2)}%<br>`;
            if(sd.vol>0.04){alert(`⚠️ ${selected[i]} volatility exceeded 4%!`);}
        }
    });
    document.getElementById("stockInfo").innerHTML=infoHTML;

    // update heatmap
    const heatEl=document.getElementById("heatmap"); heatEl.innerHTML="";
    sp500Symbols.forEach(sym=>{
        fetchStockData(sym).then(sd=>{
            if(sd){
                let color=sd.vol<0.015?"#4AFE82":sd.vol<0.03?"#F2E94E":"#FF4E4E";
                const cell=document.createElement("div");
                cell.className="heatCell"; cell.style.background=color; cell.textContent=sym;
                heatEl.appendChild(cell);
            }
        });
    });
}

// auto-update every 30s
setInterval(updateDashboard,30000);
selectEl.addEventListener("change",updateDashboard);
updateDashboard();
</script>

</body>
</html>
